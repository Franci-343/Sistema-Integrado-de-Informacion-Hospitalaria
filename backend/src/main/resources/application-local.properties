 spring.application.name=backend

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/${POSTGRES_DB:siih}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:siih_app}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:siih_dev_password}}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.default_schema=public

spring.sql.init.mode=never

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.locations=classpath:db/migration

spring.mvc.problemdetails.enabled=true
server.error.include-message=never

server.port=${SERVER_PORT:8080}

app.security.jwt-secret=${SIIH_JWT_SECRET:siih-development-secret-change-before-production-2026}
app.security.access-token-minutes=${SIIH_ACCESS_TOKEN_MINUTES:15}
app.security.refresh-token-hours=${SIIH_REFRESH_TOKEN_HOURS:8}
app.security.remember-token-days=${SIIH_REMEMBER_TOKEN_DAYS:7}
app.security.max-login-attempts=${SIIH_MAX_LOGIN_ATTEMPTS:5}
app.security.lock-minutes=${SIIH_LOCK_MINUTES:15}
