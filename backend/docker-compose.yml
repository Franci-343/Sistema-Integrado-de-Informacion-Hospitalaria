name: siih-backend

services:
  postgres:
    image: postgres:16-alpine
    container_name: siih-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-siih}
      POSTGRES_USER: ${POSTGRES_USER:-siih_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-siih_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - siih_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    profiles:
      - app
    build:
      context: .
      dockerfile: Dockerfile
    container_name: siih-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-siih}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-siih_app}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-siih_dev_password}
      SERVER_PORT: 8080
    ports:
      - "${BACKEND_PORT:-8080}:8080"

volumes:
  siih_postgres_data:
    name: siih_postgres_data
